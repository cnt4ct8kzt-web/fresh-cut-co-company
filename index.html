<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Cut Co</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e8efe8;
  color: #1f2a1f;
}

/* HEADER */
header {
  background: #2f4f3f;
  color: white;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo img {
  height: 45px;
  border-radius: 8px;
}

nav {
  display: flex;
  align-items: center;
  gap: 12px;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* SOCIALS */
.socials a {
  color: white;
  font-size: 18px;
  margin-left: 10px;
}

/* HERO */
.hero {
  height: 80vh;
  background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
              url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 20px;
}

.hero h2 {
  font-size: 48px;
}

.btn {
  background: #3d6b4f;
  padding: 12px 18px;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
  border-radius: 6px;
}

.call-btn {
  background: #1f7a3a;
  margin-left: 10px;
}

/* SECTIONS */
.section {
  padding: 50px 20px;
  text-align: center;
}

.cards {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 20px;
  width: 240px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* BOOKING FORM */
form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, textarea {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button.submit {
  background: #2f4f3f;
  color: white;
  padding: 12px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

/* FOOTER */
footer {
  background: #2f4f3f;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="https://via.placeholder.com/120x50.png?text=Fresh+Cut+Co" alt="logo">
  </div>

  <nav>
    <a href="#services">Services</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>

    <div class="socials">
      <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
  </nav>
</header>

<div class="hero">
  <div>
    <h2>Clean Cuts. Clean Yards.</h2>
    <p>Professional landscaping that hits different</p>

    <button class="btn">Get Quote</button>

    <a href="tel:1234567890">
      <button class="btn call-btn">Call Now 📞</button>
    </a>
  </div>
</div>

<section id="services" class="section">
  <h2>Services</h2>
  <div class="cards">
    <div class="card">Lawn Mowing</div>
    <div class="card">Trimming</div>
    <div class="card">Cleanups</div>
  </div>
</section>

<section id="about" class="section">
  <h2>About</h2>
  <p>Local team delivering clean, sharp yard work with premium vibes.</p>
</section>

<section id="contact" class="section">
  <h2>Book a Job</h2>

  <form action="mailto:freshcutco@email.com" method="POST" enctype="text/plain">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <textarea name="message" placeholder="What do you need done?" rows="4"></textarea>
    <button class="submit" type="submit">Send Request</button>
  </form>
</section>

<footer>
  <p>© 2026 Fresh Cut Co</p>
</footer>

</body>
</html>
