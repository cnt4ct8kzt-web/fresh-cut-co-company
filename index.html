<!DOCTYPE html>
<html>
<head>
  <title>Fresh Cut Co Landscaping</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #222;
      text-align: center;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 40px 20px;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    .section {
      padding: 30px 20px;
    }

    .card {
      background: white;
      margin: 15px auto;
      padding: 20px;
      width: 80%;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #256428;
    }
  </style>
</head>

<body>

  <header>
    <h1>Fresh Cut Co</h1>
    <p>Clean yards. Clean cuts. Clean life 🔥</p>
  </header>

  <div class="section">
    <div class="card">
      <h2>Our Services</h2>
      <p>Mowing • Trimming • Yard cleanups • Basic landscaping</p>
    </div>

    <div class="card">
      <h2>Contact Us</h2>
      <p>Text or call for a free quote</p>
      <a class="btn" href="tel:0000000000">Call Now</a>
    </div>
  </div>

</body>
</html>
